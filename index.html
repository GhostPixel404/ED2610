<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email HA</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b0f19;
    color: #e5e7eb;
}

/* Layout */
.wrapper {
    max-width: 720px;
    margin: auto;
    padding: 20px 16px 40px;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    font-size: 22px;
    margin: 0;
}

.header p {
    font-size: 13px;
    color: #9ca3af;
    margin-top: 5px;
}

/* Card sections */
.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
}

/* Labels */
label {
    font-size: 12px;
    color: #9ca3af;
}

/* Inputs */
textarea {
    width: 100%;
    margin-top: 6px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #1f2937;
    background: #0b0f19;
    color: #e5e7eb;
    font-size: 14px;
    resize: none;
}

textarea:focus {
    outline: none;
    border-color: #4f46e5;
}

/* Buttons */
.button-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 14px;
}

.primary {
    background: #4f46e5;
    color: white;
}

.primary:hover {
    background: #4338ca;
}

.secondary {
    background: #1f2937;
    color: #e5e7eb;
}

.secondary:hover {
    background: #374151;
}

/* Output email */
.output {
    display: none;
}

.meta {
    font-size: 12px;
    color: #9ca3af;
}

.email {
    margin-top: 10px;
    line-height: 1.65;
    color: #d1d5db;
}

.email p {
    margin-bottom: 12px;
}

/* Decoder */
.decoder-title {
    font-size: 14px;
    margin-bottom: 10px;
    color: #e5e7eb;
}

.result {
    margin-top: 10px;
    font-size: 14px;
    color: #22c55e;
}

/* Mobile */
@media (max-width: 600px) {
    .header h1 {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <h1>Email HA</h1>
        <p>Generate natural emails with embedded context</p>
    </div>

    <!-- Input -->
    <div class="card">
        <label>Hidden Message</label>
        <textarea id="secret" rows="3" placeholder="Type your hidden message..."></textarea>

        <label>Password (optional)</label>
        <textarea id="password" rows="2" placeholder="Optional password"></textarea>

        <div class="button-group">
            <button class="primary" onclick="generate()">Generate</button>
            <button class="secondary" onclick="copyEmail()">Copy</button>
        </div>
    </div>

    <!-- Output -->
    <div class="card output" id="output"></div>

    <!-- Decoder -->
    <div class="card">
        <div class="decoder-title">Decoder</div>

        <textarea id="decodeInput" rows="4" placeholder="Paste email here..."></textarea>
        <textarea id="decodePass" rows="2" placeholder="Password"></textarea>

        <button class="primary" onclick="decode()">Decode</button>

        <div class="result" id="decodedText"></div>
    </div>

</div>

<script>
const ZWSP="\u200B"; 
const ZWNJ="\u200C";

function encrypt(text, pass){
    if(!pass) return text;
    let res="";
    for(let i=0;i<text.length;i++){
        res+=String.fromCharCode(text.charCodeAt(i)^pass.charCodeAt(i%pass.length));
    }
    return res;
}

function encode(msg, pass){
    msg = encrypt(msg, pass);

    let binary="";
    for(let c of msg){
        binary+=c.charCodeAt(0).toString(2).padStart(8,"0");
    }

    let zw="";
    for(let b of binary){
        zw += b==="0"?ZWSP:ZWNJ;
    }

    return zw;
}

function decodeMessage(text, pass){
    let bits="";
    for(let c of text){
        if(c===ZWSP) bits+="0";
        if(c===ZWNJ) bits+="1";
    }

    let res="";
    for(let i=0;i<bits.length;i+=8){
        let byte=bits.substr(i,8);
        if(byte.length===8){
            res+=String.fromCharCode(parseInt(byte,2));
        }
    }

    return encrypt(res, pass);
}

const paragraphPool = [
"Recently I’ve been exploring how spacing systems influence readability across different layouts.",
"I’ve been experimenting with quieter typography systems and subtle hierarchy shifts.",
"Layering has been a big focus, especially how depth can enhance minimal compositions.",
"I’ve been refining interaction consistency across different screens.",
"Lately I’ve been drawn toward more restrained and controlled design approaches.",
"I’ve been testing asymmetry to create more dynamic visual balance.",
"I’ve been refining micro-interactions and small transitions.",
"I’ve been exploring material-inspired elements in digital layouts.",
"I keep focusing on consistency across scaling systems.",
"I’ve been building modular systems that adapt flexibly."
];

function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

function insertHidden(text, hidden, state){
    let result="";
    for(let i=0;i<text.length;i++){
        result+=text[i];
        if(state.index < hidden.length && Math.random()<0.12){
            result+=hidden[state.index++];
        }
    }
    return result;
}

function generate(){
    let msg=document.getElementById("secret").value.trim();
    let pass=document.getElementById("password").value;

    if(!msg) return alert("Enter message");

    let hidden = encode(msg, pass);

    let selected = shuffle([...paragraphPool]).slice(0,5);
    let state = {index:0};

    let paragraphs = selected.map(p => 
        `<p>${insertHidden(p, hidden, state)}</p>`
    ).join("");

    if(state.index < hidden.length){
        paragraphs += hidden.slice(state.index);
    }

    const email = `
<div class="meta">From: studio.flow@designmail.com</div>
<div class="meta">Subject: Direction Update</div>

<div class="email">
${paragraphs}
<p>Let me know your thoughts when you get time.</p>
</div>
`;

    let out=document.getElementById("output");
    out.innerHTML=email;
    out.style.display="block";
}

function decode(){
    let text=document.getElementById("decodeInput").value;
    let pass=document.getElementById("decodePass").value;

    let decoded=decodeMessage(text, pass);
    document.getElementById("decodedText").innerText="Decoded: "+decoded;
}

function copyEmail(){
    let el=document.getElementById("output");
    let range=document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand("copy");
}
</script>

</body>
</html>
